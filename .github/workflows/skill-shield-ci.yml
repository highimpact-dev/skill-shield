name: Skill Shield CI

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'marketplace/skills/**'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  scan:
    name: Scan Changed Skills
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get changed skill directories
        id: changed-skills
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'skills/**' 'marketplace/skills/**' | \
            grep -E '^(skills/|marketplace/skills/)' | \
            while IFS= read -r file; do
              # Extract the skill directory (first two path segments for skills/, first three for marketplace/skills/)
              if echo "$file" | grep -q '^marketplace/skills/'; then
                echo "$file" | awk -F/ '{print $1"/"$2"/"$3}'
              else
                echo "$file" | awk -F/ '{print $1"/"$2}'
              fi
            done | sort -u)

          if [ -z "$CHANGED" ]; then
            echo "No skill directories changed."
            echo "skills=" >> $GITHUB_OUTPUT
            exit 0
          fi

          EXISTING=""
          for dir in $CHANGED; do
            if [ -d "$dir" ]; then
              EXISTING="$EXISTING $dir"
            fi
          done

          echo "skills=$EXISTING" >> $GITHUB_OUTPUT
          echo "Changed skill directories: $EXISTING"

      - name: Run skill-shield on changed skills
        if: steps.changed-skills.outputs.skills != ''
        id: scan-results
        run: |
          SKILLS="${{ steps.changed-skills.outputs.skills }}"
          SCANNER="skills/skill-shield/scripts/scan.mjs"
          REPORT=""
          OVERALL_PASS=true
          LOWEST_SCORE=100

          for SKILL_DIR in $SKILLS; do
            SKILL_NAME=$(basename "$SKILL_DIR")
            echo "::group::Scanning $SKILL_NAME"

            JSON=$(node "$SCANNER" "$SKILL_DIR" 2>&1)
            SCORE=$(echo "$JSON" | jq -r '.trustScore')
            GRADE=$(echo "$JSON" | jq -r '.grade')
            LABEL=$(echo "$JSON" | jq -r '.gradeLabel')
            TOTAL=$(echo "$JSON" | jq -r '.summary.totalFindings')
            CRITICAL=$(echo "$JSON" | jq -r '.summary.critical')
            HIGH=$(echo "$JSON" | jq -r '.summary.high')
            MEDIUM=$(echo "$JSON" | jq -r '.summary.medium')

            echo "Score: $SCORE/100 Grade: $GRADE ($LABEL)"
            echo "Findings: $TOTAL (critical: $CRITICAL, high: $HIGH, medium: $MEDIUM)"

            # Build findings list
            FINDINGS_LIST=""
            FINDING_COUNT=$(echo "$JSON" | jq '.findings | length')
            for i in $(seq 0 $((FINDING_COUNT - 1))); do
              SEV=$(echo "$JSON" | jq -r ".findings[$i].severity" | tr '[:lower:]' '[:upper:]')
              PAT=$(echo "$JSON" | jq -r ".findings[$i].pattern")
              FILE=$(echo "$JSON" | jq -r ".findings[$i].file")
              LINE=$(echo "$JSON" | jq -r ".findings[$i].line")
              DESC=$(echo "$JSON" | jq -r ".findings[$i].description")
              FINDINGS_LIST="${FINDINGS_LIST}
- **[$SEV]** \`$PAT\` тАФ $FILE:$LINE тАФ $DESC"
            done

            if [ -z "$FINDINGS_LIST" ]; then
              FINDINGS_LIST="No issues found."
            fi

            # Track lowest score
            if [ "$SCORE" -lt "$LOWEST_SCORE" ]; then
              LOWEST_SCORE=$SCORE
            fi

            # Determine pass/fail
            if [ "$SCORE" -lt 50 ]; then
              OVERALL_PASS=false
              STATUS="BLOCKED"
              BADGE="ЁЯФ┤"
            elif [ "$SCORE" -lt 75 ]; then
              STATUS="CAUTION"
              BADGE="ЁЯЯб"
            else
              STATUS="VERIFIED"
              BADGE="ЁЯЯв"
            fi

            REPORT="$REPORT
### $BADGE \`$SKILL_NAME\` тАФ Grade $GRADE ($SCORE/100) тАФ $LABEL

**Status**: $STATUS

**Findings** ($TOTAL total: $CRITICAL critical, $HIGH high, $MEDIUM medium):
$FINDINGS_LIST

---"
            echo "::endgroup::"
          done

          # Write report for next step
          cat > /tmp/scan-report.txt << REPORTEOF
$REPORT
REPORTEOF
          echo "overall_pass=$OVERALL_PASS" >> $GITHUB_OUTPUT
          echo "lowest_score=$LOWEST_SCORE" >> $GITHUB_OUTPUT

      - name: Post trust report as PR comment
        if: steps.changed-skills.outputs.skills != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/scan-report.txt', 'utf8');
            const overallPass = '${{ steps.scan-results.outputs.overall_pass }}' === 'true';
            const lowestScore = parseInt('${{ steps.scan-results.outputs.lowest_score }}') || 0;

            const header = overallPass
              ? '## Skill Shield CI тАФ All Skills Verified тЬЕ'
              : '## Skill Shield CI тАФ Merge Blocked ЁЯЪл';

            const summary = overallPass
              ? `All changed skills passed the security gate (lowest score: ${lowestScore}/100).`
              : `One or more skills scored below 50/100 (grade D or F). Merge is blocked until issues are resolved.`;

            const body = `${header}\n\n${summary}\n\n---\n\n${report}\n\n<sub>Scanned by <a href="https://github.com/highimpact-dev/skill-shield">skill-shield</a></sub>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Skill Shield CI')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Add shield-verified label on pass
        if: steps.changed-skills.outputs.skills != '' && steps.scan-results.outputs.overall_pass == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'shield-verified',
                color: '0e8a16',
                description: 'All skills in this PR passed the skill-shield security scan',
              });
            } catch (e) {}

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['shield-verified'],
            });

      - name: Remove shield-verified label on failure
        if: steps.changed-skills.outputs.skills != '' && steps.scan-results.outputs.overall_pass == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'shield-verified',
              });
            } catch (e) {}

      - name: Fail if trust score below gate
        if: steps.changed-skills.outputs.skills != '' && steps.scan-results.outputs.overall_pass == 'false'
        run: |
          echo "тЭМ One or more skills scored below the merge gate (50/100)."
          echo "Fix the flagged patterns or document legitimate use in your SKILL.md frontmatter."
          echo "See CONTRIBUTING.md for guidance."
          exit 1
