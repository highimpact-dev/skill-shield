name: Skill Shield CI

on:
  pull_request:
    paths:
      - "skills/**"
      - "marketplace/skills/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    name: Scan Changed Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - name: Detect changed skills
        id: detect
        run: |
          DIRS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'skills/' 'marketplace/skills/' | \
            sed -E 's|^(marketplace/skills/[^/]+|skills/[^/]+)/.*|\1|' | sort -u | tr '\n' ' ')
          echo "dirs=$DIRS" >> "$GITHUB_OUTPUT"
          echo "Found: $DIRS"

      - name: Scan skills
        if: steps.detect.outputs.dirs != ''
        id: scan
        run: |
          PASS=true
          LOWEST=100
          REPORT=""
          for DIR in ${{ steps.detect.outputs.dirs }}; do
            [ ! -d "$DIR" ] && continue
            NAME=$(basename "$DIR")
            JSON=$(node skills/skill-shield/scripts/scan.mjs "$DIR")
            SCORE=$(echo "$JSON" | jq -r '.trustScore')
            GRADE=$(echo "$JSON" | jq -r '.grade')
            LABEL=$(echo "$JSON" | jq -r '.gradeLabel')
            COUNT=$(echo "$JSON" | jq -r '.summary.totalFindings')
            CRIT=$(echo "$JSON" | jq -r '.summary.critical')
            HIGH=$(echo "$JSON" | jq -r '.summary.high')
            MED=$(echo "$JSON" | jq -r '.summary.medium')
            FLIST=$(echo "$JSON" | jq -r '.findings[] | "- [\(.severity | ascii_upcase)] \(.pattern) -- \(.file):\(.line)"')
            [ -z "$FLIST" ] && FLIST="No issues found."
            [ "$SCORE" -lt "$LOWEST" ] && LOWEST=$SCORE
            if [ "$SCORE" -lt 50 ]; then
              PASS=false
              BADGE="X"
              STATUS="BLOCKED"
            elif [ "$SCORE" -lt 75 ]; then
              BADGE="!"
              STATUS="CAUTION"
            else
              BADGE="OK"
              STATUS="VERIFIED"
            fi
            REPORT="$REPORT
          ### [$BADGE] $NAME - Grade $GRADE ($SCORE/100) - $LABEL
          **Status**: $STATUS
          **Findings** ($COUNT total: $CRIT critical, $HIGH high, $MED medium):
          $FLIST
          ---"
            echo "$NAME: $SCORE/100 ($GRADE)"
          done
          echo "$REPORT" > /tmp/report.txt
          echo "pass=$PASS" >> "$GITHUB_OUTPUT"
          echo "lowest=$LOWEST" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: steps.detect.outputs.dirs != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/report.txt', 'utf8');
            const pass = '${{ steps.scan.outputs.pass }}' === 'true';
            const lowest = '${{ steps.scan.outputs.lowest }}';
            const header = pass
              ? '## Skill Shield CI - All Skills Verified'
              : '## Skill Shield CI - Merge Blocked';
            const summary = pass
              ? `All skills passed (lowest: ${lowest}/100).`
              : 'One or more skills scored below 50. Merge blocked.';
            const body = `${header}\n\n${summary}\n\n---\n${report}\n\n_Scanned by [skill-shield](https://github.com/highimpact-dev/skill-shield)_`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes('Skill Shield CI'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

      - name: Gate check
        if: steps.detect.outputs.dirs != '' && steps.scan.outputs.pass == 'false'
        run: |
          echo "Merge blocked: skill(s) scored below 50/100."
          exit 1
